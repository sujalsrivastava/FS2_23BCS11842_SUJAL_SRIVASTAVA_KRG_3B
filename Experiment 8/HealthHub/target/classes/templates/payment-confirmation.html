<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Confirmation</title>
    <style>
        body { font-family: Arial, sans-serif; color: #333; }
        .container { max-width: 600px; margin: 24px auto; border: 1px solid #e6e6e6; padding: 20px; border-radius: 6px; }
        .header { background: #0d6efd; color: white; padding: 12px; border-radius: 4px; }
        .content { margin-top: 12px; }
        .footer { margin-top: 20px; font-size: 12px; color: #666; }
        .summary { background: #f8f9fa; padding: 10px; border-radius: 4px; margin-top: 12px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>HealthHub - Payment Confirmation</h2>
    </div>

    <div class="content">
        <p>Hi <strong th:text="${name}">Patient</strong>,</p>

        <p>Thank you for your payment. This is a confirmation for your appointment.</p>

        <div class="summary">
            <p><strong>Appointment ID:</strong> <span th:text="${appointmentId}">#123</span></p>
            <p><strong>Amount Paid:</strong> ₹ <span th:text="${amountInRupees}">0.00</span></p>
            <p><strong>Transaction ID:</strong> <span th:text="${transactionId}">txn_abc</span></p>
        </div>

        <p>If you have any questions, reply to this email or contact our support.</p>

        <div class="footer">
            <p>Regards,<br/>HealthHub Team</p>
        </div>
    </div>
</div>
</body>
</html>
